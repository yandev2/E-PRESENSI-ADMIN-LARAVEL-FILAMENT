name: Deploy Production

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo, pdo_pgsql, gd, bcmath, zip, dom, curl
          coverage: none

      - name: Validate composer.json & composer.lock
        run: composer validate --no-check-all

      - name: Install dependencies (no-dev)
        # Menggunakan --ignore-platform-reqs untuk melewati pengecekan ekstensi di GitHub Runner
        run: composer install --no-interaction --prefer-dist --no-progress --no-dev --optimize-autoloader --ignore-platform-reqs

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend build
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack enable && pnpm i --frozen-lockfile && pnpm run build
          elif [ -f yarn.lock ]; then
            corepack enable && yarn install --frozen-lockfile && yarn build
          elif [ -f package-lock.json ]; then
            npm ci && npm run build
          else
            echo "No frontend build step"
          fi

      - name: Package artifact
        run: |
          # Hapus file yang tidak perlu dikirim ke server untuk menghemat ruang
          rm -rf .git tests node_modules storage bootstrap/cache
          tar -czf ../app.tar.gz ./
          mv ../app.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: app.tar.gz

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: .

      - name: Install ssh key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload & extract release
        run: |
          # Generate nama rilis berdasarkan timestamp
          REL=$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}
          echo "RELEASE=$REL" >> $GITHUB_ENV
          
          # Buat folder rilis di VPS
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ${{ secrets.APP_DIR }}/releases/$REL"
          
          # Upload file tar.gz
          scp -P "${{ secrets.SSH_PORT }}" app.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.APP_DIR }}/releases/$REL/
          
          # Ekstrak file di VPS
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ${{ secrets.APP_DIR }}/releases/$REL && tar -xzf app.tar.gz && rm app.tar.gz"

      - name: Link shared dirs (storage, env, bootstrap cache)
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
          cd ${{ secrets.APP_DIR }}/releases/${{ env.RELEASE }}
          
          # Hubungkan folder storage dan file .env dari folder shared
          ln -sfn ${{ secrets.APP_DIR }}/shared/storage storage
          ln -sfn ${{ secrets.APP_DIR }}/shared/.env .env
          
          # Atur bootstrap cache agar tidak terjadi error permission
          rm -rf bootstrap/cache
          mkdir -p ${{ secrets.APP_DIR }}/shared/bootstrap-cache
          ln -sfn ${{ secrets.APP_DIR }}/shared/bootstrap-cache bootstrap/cache
          "

      - name: Composer install & Laravel optimize
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
          set -e
          cd ${{ secrets.APP_DIR }}/releases/${{ env.RELEASE }}
          
          # Install dependencies di server (menggunakan PHP server)
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
          
          # Optimasi cache Laravel
          php artisan storage:link || true
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan icons:cache || true
          
          # Atur hak akses folder
          chgrp -R www-data bootstrap/cache storage || true
          chmod -R ug+rwx bootstrap/cache storage || true
          "

      - name: Migrate DB
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
          cd ${{ secrets.APP_DIR }}/releases/${{ env.RELEASE }}
          # Jalankan migrasi database
          php artisan migrate --force
          "

      - name: Activate release (symlink swap)
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
          set -e
          # Pindahkan pointer 'current' ke rilis terbaru
          ln -sfn '${{ secrets.APP_DIR }}/releases/${{ env.RELEASE }}' '${{ secrets.APP_DIR }}/current'
          
          # Reload PHP-FPM dan Nginx agar perubahan langsung aktif
          sudo -n systemctl reload php8.2-fpm || true
          sudo -n systemctl reload nginx || true
          "

      - name: Prune old releases (keep last 5)
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
          cd ${{ secrets.APP_DIR }}/releases
          # Hapus rilis lama, sisakan 5 rilis terbaru saja
          ls -1t | tail -n +6 | xargs rm -rf -- || true
          "