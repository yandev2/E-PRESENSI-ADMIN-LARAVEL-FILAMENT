name: Deploy Production

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo, pdo_pgsql, gd, bcmath, zip
          coverage: none

      - name: Install dependencies (no-dev)
        # Kita pakai --no-scripts di build agar tidak butuh .env di komputer GitHub
        run: composer install --no-interaction --prefer-dist --no-progress --no-dev --optimize-autoloader --ignore-platform-reqs --no-scripts

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend build
        run: |
          npm install
          npm run build

      - name: Package artifact
        run: |
          # Persis seperti file lama Anda
          rm -rf .git tests node_modules vendor storage bootstrap/cache
          tar -czf ../app.tar.gz ./
          mv ../app.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: app.tar.gz

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: .

      - name: Install ssh key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload & extract release
        run: |
          # Kita definisikan variabel REL di sini
          REL=$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}
          echo "RELEASE=$REL" >> $GITHUB_ENV
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ${{ secrets.APP_DIR }}/releases/$REL"
          scp -P "${{ secrets.SSH_PORT }}" app.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.APP_DIR }}/releases/$REL/
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ${{ secrets.APP_DIR }}/releases/$REL && tar -xzf app.tar.gz && rm app.tar.gz"

      - name: Link shared dirs (KUNCI SUKSES)
        run: |
          # Menggunakan variabel ${{ env.RELEASE }} dari GitHub env
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
          cd ${{ secrets.APP_DIR }}/releases/${{ env.RELEASE }}
          ln -sfn ${{ secrets.APP_DIR }}/shared/storage storage
          ln -sfn ${{ secrets.APP_DIR }}/shared/.env .env
          rm -rf bootstrap/cache
          ln -sfn ${{ secrets.APP_DIR }}/shared/bootstrap-cache bootstrap/cache
          "

      - name: Composer install & Laravel optimize (server)
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
          set -e
          cd ${{ secrets.APP_DIR }}/releases/${{ env.RELEASE }}
          
          # Gunakan --ignore-platform-reqs jika intl di VPS masih bermasalah
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --ignore-platform-reqs
          
          php artisan storage:link || true
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          
          chgrp -R www-data bootstrap/cache storage || true
          chmod -R ug+rwx bootstrap/cache storage || true
          "

      - name: Migrate DB
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
          cd ${{ secrets.APP_DIR }}/releases/${{ env.RELEASE }}
          php artisan migrate --force
          "

      - name: Activate release
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
          set -e
          ln -sfn '${{ secrets.APP_DIR }}/releases/${{ env.RELEASE }}' '${{ secrets.APP_DIR }}/current'
          sudo -n systemctl reload php8.2-fpm || sudo -n systemctl reload php8.3-fpm || true
          sudo -n systemctl reload nginx || true
          "