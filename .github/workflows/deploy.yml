name: Deploy Production

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo, pdo_pgsql, gd, bcmath, zip
          coverage: none

      - name: Install dependencies (Build)
        run: composer install --no-interaction --prefer-dist --no-progress --no-dev --optimize-autoloader --ignore-platform-reqs --no-scripts

      - name: Node.js & Frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Assets
        run: |
          npm install
          npm run build

      - name: Package artifact
        run: |
          # Jangan bawa folder vendor ke tarbal agar upload cepat
          rm -rf .git tests node_modules vendor storage bootstrap/cache
          tar -czf ../app.tar.gz ./
          mv ../app.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: app.tar.gz

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: .

      - name: Install ssh key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy Process
        run: |
          # 1. Tentukan Nama Rilis
          REL=$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}
          
          # 2. Upload File
          scp -P "${{ secrets.SSH_PORT }}" app.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.APP_DIR }}/releases/tmp-$REL.tar.gz
          
          # 3. Eksekusi di Server
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
          set -e
          cd ${{ secrets.APP_DIR }}/releases
          mkdir -p $REL
          tar -xzf tmp-$REL.tar.gz -C $REL
          rm tmp-$REL.tar.gz
          cd $REL
          
          # --- LANGKAH KRUSIAL: BUAT FOLDER FISIK DULU ---
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/{cache,sessions,views}
          mkdir -p storage/app/public
          chmod -R 775 bootstrap/cache storage
          
          # Link .env agar artisan bisa baca APP_KEY dll
          ln -sfn ${{ secrets.APP_DIR }}/shared/.env .env
          
          # --- JALANKAN COMPOSER (KITA IZINKAN SCRIPTS KALI INI KARENA FOLDER SUDAH ADA) ---
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --ignore-platform-reqs
          
          # --- OPTIMASI FILAMENT & LARAVEL ---
          php artisan filament:upgrade
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan storage:link || true
          
          # --- FIX PERMISSIONS ---
          chgrp -R www-data bootstrap/cache storage || true
          chmod -R ug+rwx bootstrap/cache storage || true
          
          # --- AKTIVASI ---
          ln -sfn ${{ secrets.APP_DIR }}/releases/$REL ${{ secrets.APP_DIR }}/current
          "

      - name: Post-Deploy (Migration & Reload)
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
          cd ${{ secrets.APP_DIR }}/current
          php artisan migrate --force
          sudo -n systemctl reload php8.3-fpm || sudo -n systemctl reload php8.2-fpm || true
          sudo -n systemctl reload nginx || true
          "